title: "[Showcase] "
body:
  - type: markdown
    attributes:
      value: |
        Show off how you're using Prompsit CLI! Screenshots, metrics, and links are welcome.
  - type: textarea
    id: description
    attributes:
      label: What did you build or achieve?
      description: Describe your project, workflow, or integration.
    validations:
      required: true
  - type: textarea
    id: usage
    attributes:
      label: How are you using Prompsit CLI?
      description: Which commands and workflows are part of your setup?
      placeholder: "translate for localizing docs, eval for QA pipeline, score for corpus cleaning..."
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Results / Outcomes
      description: What was the impact? Time saved, quality improvements, metrics?
    validations:
      required: false
  - type: textarea
    id: links
    attributes:
      label: Links
      description: Repository URL, screenshots, blog post, or demo — anything that shows the work.
    validations:
      required: false
